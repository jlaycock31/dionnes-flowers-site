<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery – Petal & Ground</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Jost:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:#faf8f4;color:#2c2a1e}
nav{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2rem;background:#fff;border-bottom:0.5px solid #e0dbd0}
.logo{font-family:'Playfair Display',serif;font-size:20px}.logo em{font-style:italic;color:#5a7a4a}.logo a{color:inherit;text-decoration:none}
.nav-links{display:flex;gap:1.5rem}
.nav-links a{font-size:12px;letter-spacing:0.09em;text-transform:uppercase;color:#888;text-decoration:none;cursor:pointer}
.nav-links a.active{color:#4a6a3a;border-bottom:1.5px solid #4a6a3a;padding-bottom:2px}
.page-header{background:#f4f0e8;padding:2.8rem 2rem 2.2rem;text-align:center;border-bottom:0.5px solid #ddd6c4}
.page-tag{font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:#7a6a4a;margin-bottom:0.5rem}
.page-h1{font-family:'Playfair Display',serif;font-size:34px;font-weight:400;color:#2c2a1e}
.page-h1 em{font-style:italic;color:#5a7a4a}
.divider{width:44px;height:1.5px;background:#7a9a5a;margin:1rem auto 0}
.filter-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:1.1rem 2rem;background:#fff;border-bottom:0.5px solid #e0dbd0;flex-wrap:wrap}
.filter-btn{padding:5px 16px;border-radius:20px;cursor:pointer;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.05em;border:0.5px solid #c0b8a8;background:#fff;color:#888;transition:all 0.15s}
.filter-btn.active{background:#4a6a3a;color:#e8f0e0;border-color:#4a6a3a}
.filter-count{font-size:11px;color:#aaa;margin-left:4px}
.gallery-wrap{padding:1.5rem;max-width:1200px;margin:0 auto}
.masonry{column-count:3;column-gap:12px}
.m-item{break-inside:avoid;margin-bottom:12px;position:relative;overflow:hidden;border-radius:4px;cursor:pointer}
.m-item img{display:block;width:100%;border-radius:4px;transition:transform 0.35s ease}
.m-item:hover img{transform:scale(1.04)}
.overlay{position:absolute;inset:0;background:rgba(44,42,30,0);display:flex;flex-direction:column;justify-content:flex-end;padding:0.9rem;transition:background 0.25s;border-radius:4px}
.m-item:hover .overlay{background:rgba(44,42,30,0.58)}
.ol-name{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:#f0ece0;opacity:0;transform:translateY(5px);transition:all 0.22s}
.ol-tag{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#a8c878;margin-top:2px;opacity:0;transform:translateY(5px);transition:all 0.22s 0.04s}
.m-item:hover .ol-name,.m-item:hover .ol-tag{opacity:1;transform:translateY(0)}
.no-results{text-align:center;padding:4rem 2rem;font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:#aaa}
.fb-cta{background:#f4f0e8;border-top:0.5px solid #ddd6c4;padding:2.5rem 2rem;text-align:center}
.fb-cta h3{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:#2c2a1e;margin-bottom:0.4rem}
.fb-cta p{font-size:14px;font-weight:300;color:#7a6a4a;margin-bottom:1.2rem;max-width:380px;margin-left:auto;margin-right:auto;line-height:1.7}
.btn-green{background:#4a6a3a;color:#e8f0e0;border:none;padding:10px 24px;border-radius:2px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;margin-right:8px}
.btn-outline{background:transparent;color:#4a6a3a;border:1px solid #4a6a3a;padding:10px 24px;border-radius:2px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer}
footer{text-align:center;padding:0.75rem;font-size:11px;color:#999;background:#fff;border-top:0.5px solid #e0dbd0;letter-spacing:0.04em}
@media(max-width:700px){.masonry{column-count:2}.nav-links{gap:1rem}}
@media(max-width:420px){.masonry{column-count:1}}
</style>
</head>
<body>
<nav>
  <div class="logo"><a href="index.html">Helen's House</a></div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a class="active" href="#">Gallery</a>
    <a href="#">Weddings</a>
    <a href="#">Contact</a>
  </div>
</nav>

<div class="page-header">
  <div class="page-tag">Our work</div>
  <h1 class="page-h1">A garden full of <em>stories</em></h1>
  <div class="divider"></div>
</div>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">All <span class="filter-count" id="cnt-all"></span></button>
  <button class="filter-btn" onclick="setFilter('fresh',this)">Fresh Cuts <span class="filter-count" id="cnt-fresh"></span></button>
  <button class="filter-btn" onclick="setFilter('arrangements',this)">Arrangements <span class="filter-count" id="cnt-arrangements"></span></button>
  <button class="filter-btn" onclick="setFilter('weddings',this)">Weddings <span class="filter-count" id="cnt-weddings"></span></button>
  <button class="filter-btn" onclick="setFilter('seasonal',this)">Seasonal <span class="filter-count" id="cnt-seasonal"></span></button>
</div>

<div class="gallery-wrap">
  <div class="masonry" id="masonry"></div>
</div>

<div class="fb-cta">
  <h3>See what's blooming this week</h3>
  <p>Fresh cuts and arrangements posted every week on Facebook. Follow along so you never miss the season.</p>
  <button class="btn-green">Follow on Facebook</button>
  <button class="btn-outline">Order an Arrangement</button>
</div>

<footer>© 2025 Petal &amp; Ground · Grown with love in Cincinnati, Ohio</footer>

<script>
// gallery_full.html — reads from gallery-data.json (managed via admin panel)
var galleryData = null;
var currentFilter = 'all';

function getPhotos(filter) {
  if (!galleryData) return [];
  var folders = galleryData.folders || [];
  var out = [];
  folders.forEach(function(folder) {
    if (filter === 'all' || folder.id === filter) {
      (folder.photos || []).forEach(function(photo) {
        out.push({ photo: photo, folder: folder });
      });
    }
  });
  return out;
}

function updateCounts() {
  ['all', 'fresh', 'arrangements', 'weddings', 'seasonal'].forEach(function(cat) {
    var elem = document.getElementById('cnt-' + cat);
    if (!elem) return;
    elem.textContent = '(' + getPhotos(cat).length + ')';
  });
}

function build(filter) {
  currentFilter = filter;
  var masonry = document.getElementById('masonry');
  if (!masonry) return;
  var items = getPhotos(filter);
  if (!items.length) {
    masonry.innerHTML = '<div class="no-results">No photos in this category yet.</div>';
    return;
  }
  masonry.innerHTML = items.map(function(item) {
    var photo  = item.photo;
    var folder = item.folder;
    var label  = photo.description || '';
    var tag    = folder.name;
    return '<div class="m-item">'
      + '<img src="' + photo.filename.replace(/"/g, '') + '" alt="' + label.replace(/"/g, '') + '" loading="lazy">'
      + '<div class="overlay">'
      + '<div class="ol-name">' + label + '</div>'
      + '<div class="ol-tag">' + tag + '</div>'
      + '</div></div>';
  }).join('');
}

function setFilter(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  build(cat);
}

fetch('gallery-data.json?_=' + Date.now())
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(d) {
    galleryData = d;
    updateCounts();
    build('all');
  })
  .catch(function() {
    var masonry = document.getElementById('masonry');
    if (masonry) masonry.innerHTML = '<div class="no-results">Gallery coming soon — follow us on Instagram and Facebook!</div>';
  });
</script>
</body>
</html>
